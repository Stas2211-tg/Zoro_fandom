<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта мира — Путь Зоро</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнительные стили для карты */
        .map-container {
            position: relative;
            margin: 30px 0;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--border);
            background: var(--card-bg);
            padding: 20px;
        }

        .map-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            position: relative;
        }

        .map-points {
            position: relative;
            margin-top: -5px;
        }

        .map-point {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px;
            background: var(--card-bg);
            border: 2px solid var(--green);
            border-radius: 30px;
            color: var(--text);
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
            font-size: 14px;
        }

        .map-point:hover {
            background: var(--green);
            transform: scale(1.05);
        }

        .map-point.active {
            background: var(--green);
            box-shadow: 0 0 20px rgba(26, 138, 58, 0.4);
        }

        #location-info {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            margin-top: 30px;
            display: none;
            animation: fadeInUp 0.5s ease;
        }

        #location-info h3 {
            font-family: 'Russo One', sans-serif;
            font-size: 28px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        #location-info p {
            margin: 10px 0;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <img src="img/zoro-skull.png" alt="Герб Зоро" class="logo-skull">
                <span>Z<span class="green">O</span>RO</span>
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="bio.html">Биография</a>
                <a href="swords.html">Мечи</a>
                <a href="map.html">Карта</a>
                <a href="fan.html">Фан-зона</a>
                <a href="robin-zoro.html">Робин & Зоро</a>
                <a href="awards.html">Награды</a>
                <a href="enemies.html">Враги</a>
            </nav>
        </div>
    </header>

    <!-- ===== КАРТА ===== -->
    <section class="map">
        <div class="container">
            <h2>🗺️ Путь <span class="gold">Зоро</span></h2>
            <p class="section-subtitle">Нажми на локацию, чтобы узнать её историю</p>

            <div class="map-container">
                <!-- ================================================= -->
                <!-- КАРТИНКА: Карта мира (img/world-map.jpg)           -->
                <!-- ================================================= -->
                <img src="img/world-map.jpg" alt="Карта мира Ван-Пис" class="map-image">
                
                <div class="map-points">
                    <button class="map-point" data-location="shimotsuki">🏯 Шимотсуки</button>
                    <button class="map-point" data-location="shellstown">⚔️ Шеллс-Таун</button>
                    <button class="map-point" data-location="arlongpark">🌊 Арлонг-парк</button>
                    <button class="map-point" data-location="enieslobby">🏛️ Эниес Лобби</button>
                    <button class="map-point" data-location="sabaody">🌴 Сабаоди</button>
                    <button class="map-point" data-location="punkhazard">🔥 Панк Хазард</button>
                    <button class="map-point" data-location="wano">⛩️ Вано</button>
                </div>
            </div>

            <div id="location-info">
                <!-- Сюда скрипт подставит информацию -->
            </div>
        </div>
    </section>

    <!-- ===== ПОДВАЛ ===== -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-logo">
                <img src="img/zoro-skull.png" alt="Герб Зоро" class="footer-skull">
                <span>Z<span class="green">O</span>RO</span>
            </div>
            <div class="footer-links">
                <a href="https://onepiecedl.com/" target="_blank" class="footer-btn">Смотреть аниме</a>
                <a href="https://onepiece.fandom.com/ru/wiki/%D0%A0%D0%BE%D1%80%D0%BE%D0%BD%D0%BE%D0%B0_%D0%97%D0%BE%D1%80%D0%BE" target="_blank" class="footer-btn">Вики Зоро</a>
            </div>
            <div class="footer-copy">
                <p>Создано фанатом для фанатов. Вся информация проверена по манге и SBS.</p>
                <p>© 2026 — Roronoa Zoro Fan Site</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
